<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Montreal Art Club</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
      margin: 0;
      padding: 0;
      line-height: 1.5;
    }

    .lang-switcher {
      position: fixed;
      top: 1rem;
      right: 2rem;
      z-index: 1000;
    }

    .lang-switcher button {
      background: none;
      border: 1px solid #cccccc;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      cursor: pointer;
      color: #0066cc;
      text-decoration: underline;
      margin-left: 0.5rem;
    }

    .lang-switcher button.active {
      color: #000000;
      text-decoration: none;
      font-weight: bold;
    }

    .hero {
      padding: 3rem 2rem;
      max-width: 800px;
      margin: 0 auto;
    }

    .hero h1 {
      font-size: 2.5rem;
      font-weight: bold;
      margin: 0;
    }

    .title-blue {
      color: #0066cc;
      -webkit-text-stroke: 1px #000000;
      text-stroke: 1px #000000;
    }

    .title-yellow {
      color: #ffcc00;
      -webkit-text-stroke: 1px #000000;
      text-stroke: 1px #000000;
    }

    .title-red {
      color: #ff0000;
      -webkit-text-stroke: 1px #000000;
      text-stroke: 1px #000000;
    }

    .hero p {
      font-size: 1rem;
      margin: 1rem 0 0 0;
      color: #333333;
    }

    section {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      border-top: 1px solid #cccccc;
    }

    section h2 {
      font-size: 1.5rem;
      font-weight: bold;
      margin: 0 0 1rem 0;
      color: #000000;
    }

    section p {
      font-size: 1rem;
      line-height: 1.6;
      color: #333333;
      margin: 0;
    }

    .link-list {
      list-style: none;
      padding: 0;
      margin: 1rem 0 0 0;
    }

    .link-list li {
      margin-bottom: 0.5rem;
    }

    .link-list a {
      color: #0066cc;
      text-decoration: underline;
    }

    .link-list a:visited {
      color: #663399;
    }

    .link-list .link-list {
      margin-left: 1.5rem;
      margin-top: 0.3rem;
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.85rem;
      color: #666666;
      border-top: 1px solid #cccccc;
    }
  </style>

  <script>
    const translations = {
      en: {
        tagline: "Arty stuff in Montréal.",
        events: "Events",
        projects: "Projects",
        friendsFilmFest2026: "Friends Film Festival 2026",
        tickets: "Tickets",
        submission: "Submission",
        friendsFilmFest: "Friends Film Festival",
        watch: "Watch",
        photos: "Photos",
        footer: "© 2026 Montreal Art Club"
      },
      fr: {
        tagline: "Des trucs arty à Montréal.",
        events: "Événements",
        projects: "Projets",
        friendsFilmFest2026: "Friends Film Festival 2026",
        tickets: "Billets",
        submission: "Soumission",
        friendsFilmFest: "Friends Film Festival",
        watch: "Regarder",
        photos: "Photos",
        footer: "© 2026 Montreal Art Club"
      }
    };

    function setLanguage(lang) {
      localStorage.setItem("language", lang);
      document.documentElement.lang = lang;
      
      // Update all translatable elements
      document.querySelectorAll("[data-translate]").forEach(el => {
        const key = el.getAttribute("data-translate");
        if (translations[lang][key]) {
          // For list items with nested lists, only update the text node
          if (el.tagName === "LI" && el.querySelector(".link-list")) {
            // Replace only the text node, not the entire content
            const nestedList = el.querySelector(".link-list");
            el.textContent = translations[lang][key];
            el.appendChild(nestedList);
          } else {
            el.textContent = translations[lang][key];
          }
        }
      });

      // Update lang switcher buttons
      document.querySelectorAll(".lang-switcher button").forEach(btn => {
        btn.classList.remove("active");
      });
      document.querySelector(`[data-lang="${lang}"]`).classList.add("active");
    }

    // Initialize language on page load
    window.addEventListener("DOMContentLoaded", () => {
      const savedLang = localStorage.getItem("language") || "en";
      setLanguage(savedLang);
    });
  </script>
</head>
<body>

  <div class="lang-switcher">
    <button data-lang="en" class="active" onclick="setLanguage('en')">EN</button>
    <button data-lang="fr" onclick="setLanguage('fr')">FR</button>
  </div>

  <div class="hero">
    <h1><span class="title-blue">Montreal</span> <span class="title-yellow">Art</span> <span class="title-red">Club</span></h1>
    <p data-translate="tagline">Art stuff in Montréal.</p>
  </div>

  <section id="events">
    <h2 data-translate="events">Events</h2>
    <ul class="link-list">
      <li data-translate="friendsFilmFest2026">Friends Film Festival 2026
        <ul class="link-list">
          <li><a href="https://www.zeffy.com/en-CA/ticketing/friends-film-festival--2026" data-translate="tickets">Tickets</a></li>
          <li><a href="https://forms.gle/avtsSXGsJnoZXtQc6" data-translate="submission">Submission</a></li>
        </ul>
      </li>
    </ul>
  </section>

  <section id="projects">
    <h2 data-translate="projects">Projects</h2>
    <ul class="link-list">
      <li data-translate="friendsFilmFest">Friends Film Festival
        <ul class="link-list">
          <li><a href="https://www.youtube.com/@friendsfilmfestival" data-translate="watch">Watch</a></li>
          <li><a href="https://www.flickr.com/photos/montrealartclub/albums/72177720313093524/" data-translate="photos">Photos</a></li>
        </ul>
      </li>
    </ul>
  </section>

  <footer data-translate="footer">
    © 2026 Montreal Art Club
  </footer>

</body>
</html>
